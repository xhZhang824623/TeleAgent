
services:
  # Nginx 反向代理
  nginxTeleAgent:
    image: nginx:1.27
    container_name: nginxTeleAgent
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-9020}:9020"
      - "${NGINX_HTTPS_PORT:-9443}:9443"
    volumes:
      - ./compose/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./compose/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./compose/nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/var/staticfiles:ro
    depends_on:
      - TeleAgent
      - TeleAgentNext
      - DbTeleAgent
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - network

  # PostgreSQL 数据库服务
  DbTeleAgent:
    image: postgres:17
    container_name: DbTeleAgent
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgbackup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
    networks:
      - network

  # Next.js 前端（手机/电脑适配）
  TeleAgentNext:
    image: teleagent-next:latest
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      network: ${DOCKER_BUILD_NETWORK:-default}
    container_name: TeleAgentNext
    restart: unless-stopped
    networks:
      - network

  TeleAgent:
    image: djangoapps:latest
    build:
      context: .
      dockerfile: backendservices/Dockerfile
      network: ${DOCKER_BUILD_NETWORK:-default}
    env_file:
      - ./.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=DbTeleAgent
      - STATIC_ROOT=/app/staticfiles
      - LOG_MAX_SIZE=${LOG_MAX_SIZE}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT}
      - LOG_FORMAT=${LOG_FORMAT}
    depends_on:
      DbTeleAgent:
        condition: service_healthy
    ports:
      # For frontend/backend split dev (Next.js dev server on host):
      # expose Django API only on localhost, not publicly.
      - "127.0.0.1:${DJANGO_PORT:-9001}:9001"
    volumes:
      - static_volume:/app/staticfiles
      - logs_volume:/app/logs
    networks:
      - network

# 网络配置
networks:
  network:
    driver: bridge

# 数据卷配置 - 使用数据盘存储
volumes:
  logs_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PREFIX}/logs/TeleAgent
  static_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PREFIX}/staticfiles
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PREFIX}/postgres/data
  pgbackup:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PREFIX}/postgres/backup
